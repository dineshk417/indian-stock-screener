name: 🤖 Auto-Improve NiftyEdge

# Runs 3× per weekday: 8 AM, 2 PM, 8 PM IST.
# Can also be triggered manually from the Actions tab with an optional focus.

on:
  schedule:
    - cron: '30 2  * * 1-5'   # 08:00 IST
    - cron: '30 8  * * 1-5'   # 14:00 IST
    - cron: '30 14 * * 1-5'   # 20:00 IST
  workflow_dispatch:
    inputs:
      focus:
        description: 'Specific improvement to make (leave blank to let the agent decide)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  improve:
    name: Improvement Run
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent dependencies
        run: pip install groq

      - name: Run improvement agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FOCUS: ${{ github.event.inputs.focus }}
        run: python scripts/auto_improve.py

      - name: Commit and push if changed
        run: |
          git config user.email "autobot@niftyedge.app"
          git config user.name "NiftyEdge AutoBot"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — run produced no changes"
          else
            git commit -m "$(cat /tmp/improve_msg.txt)"
            git push origin main
            echo "Pushed improvement to main ✓"
          fi
